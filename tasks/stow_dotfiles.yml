---
- name: Set up dotfiles using Stow
  hosts: localhost
  become: yes  # to install Stow if needed
  tasks:

    # 1. Install Stow if it is not already installed (For Arch Linux)
    - name: Install Stow
      pacman:
        name: stow
        state: present
      when: ansible_os_family == "Arch"

    # 2. Ensure the dotfiles repository is present
    - name: Clone dotfiles repository
      git:
        repo: 'https://github.com/your-username/dotfiles.git'  # Change to your dotfiles repository URL
        dest: '~/dotfiles'
        version: master  # or whichever branch/tag/commit you want
      when: ansible_facts.packages.stow is defined  # Only clone if stow is present

    # 3. Create symlinks for dotfiles using Stow
    - name: Use Stow to symlink vim dotfiles
      command: stow vim
      args:
        chdir: '~/dotfiles'
      when: ansible_facts.packages.stow is defined

    - name: Use Stow to symlink bash dotfiles
      command: stow bash
      args:
        chdir: '~/dotfiles'
      when: ansible_facts.packages.stow is defined

    - name: Use Stow to symlink tmux dotfiles
      command: stow tmux
      args:
        chdir: '~/dotfiles'
      when: ansible_facts.packages.stow is defined

    - name: Use Stow to symlink git dotfiles
      command: stow git
      args:
        chdir: '~/dotfiles'
      when: ansible_facts.packages.stow is defined
